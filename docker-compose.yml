services:
  mongo:
    networks:
      internal:
    image: bitnami/mongodb:7.0.15
    environment:
      - MONGODB_REPLICA_SET_NAME=repl-set
    volumes:
      - mongoVolume:/bitnami/mongodb
    healthcheck:
      test:
        test $$(mongosh --port 27017 --quiet --eval "try
        {rs.initiate({_id:'repl-set',members:[{_id:0,host:\"mongo:27017\"}]})} catch(e) {rs.status().ok}") -eq 1
      interval: 10s
      start_period: 30s

  minio:
    networks:
      internal:
    image: bitnami/minio:2025.5.24
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER_REDIRECT_URL: http://localhost:8080/minio/ui/
      MINIO_SERVER_URL: http://minio:9000
      MINIO_SKIP_CLIENT: yes
    volumes:
      - minioVolume:/bitnami/minio

  clamd:
    networks:
      internal:
    image: clamav/clamav:1.4.3_base
    healthcheck:
      test: ['CMD-SHELL', "echo 'PING' | nc -w 5 localhost 3310"]
      interval: 30s
      timeout: 10s
      retries: 5

  modelscan:
    networks:
      internal:
    build:
      context: ./lib/modelscan_api
      dockerfile: ./Dockerfile.dev
    volumes:
      - ./lib/modelscan_api/bailo_modelscan_api:/app/bailo_modelscan_api
    healthcheck:
      test: ['CMD-SHELL', 'curl --fail http://127.0.0.1:3311/info || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5

  mailcrab:
    networks:
      debug:
    image: marlonb/mailcrab:v1.6.1
    ports:
      - 1080:1080
      - 1025:1025

  nginx:
    networks:
      default:
      internal:
    image: nginxinc/nginx-unprivileged:1.28.0-alpine3.21-slim
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - ${EXTERNAL_PORT}:8080
    depends_on:
      - frontend
      - backend
      - registry

  registry:
    networks:
      internal:
    restart: always
    image: registry:3.0.0
    environment:
      REGISTRY_HTTP_TLS_CERTIFICATE: /certs/cert.pem
      REGISTRY_HTTP_TLS_KEY: /certs/key.pem
      REGISTRY_STORAGE_S3_ACCESSKEY: minioadmin
      REGISTRY_STORAGE_S3_SECRETKEY: minioadmin
      REGISTRY_AUTH: token
      REGISTRY_AUTH_TOKEN_REALM: http://backend:3001/api/v1/registry_auth
      REGISTRY_AUTH_TOKEN_SERVICE: RegistryAuth
      REGISTRY_AUTH_TOKEN_ISSUER: RegistryIssuer
      REGISTRY_AUTH_TOKEN_JWKS: /certs/jwks.json
      REGISTRY_AUTH_TOKEN_ROOTCERTBUNDLE: /certs/cert.pem
    volumes:
      - ./backend/config/registry.conf:/etc/distribution/config.yml
      - ./backend/certs:/certs

  frontend:
    networks:
      internal:
    build:
      context: ./frontend/
      dockerfile: ./Dockerfile.dev
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  backend:
    networks:
      internal:
    build:
      context: ./backend/
      dockerfile: ./Dockerfile.dev
    volumes:
      - ./backend/src:/app/src
      - ./backend/config:/app/config
      - ./backend/certs:/certs
      - ./backend/certs:/usr/local/share/ca-certificates
    ports:
      - 9229:9229
    depends_on:
      clamd:
        condition: service_healthy
      registry:
        condition: service_started
      modelscan:
        condition: service_healthy
      minio:
        condition: service_started
      mongo:
        condition: service_started
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      - NODE_CONFIG_ENV=${INSTANCE_NAME}_docker_compose
  webhook-tester:
    networks:
      debug:
    image: tarampampam/webhook-tester
    command: serve --port 8082 --create-session 00000000-0000-0000-0000-000000000000
    ports: ['8082:8082/tcp'] # Open <http://127.0.0.1:8080/#/00000000-0000-0000-0000-000000000000>

volumes:
  minioVolume:
    name: ${INSTANCE_NAME}_minioVolume
  mongoVolume:
    name: ${INSTANCE_NAME}_mongoVolume

networks:
  debug:
    name: ${INSTANCE_NAME}_debug
  default:
    name: ${INSTANCE_NAME}_default
  internal:
    name: ${INSTANCE_NAME}_internal
