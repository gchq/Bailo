name: bailo-prod

services:
  clamd:
    image: clamav/clamav:1.4.3_base
    networks:
      internal:
    healthcheck:
      test: ['CMD-SHELL', "echo 'PING' | nc -w 5 localhost 3310"]
      interval: 30s
      timeout: 10s
      retries: 5

  artefactscan:
    ports:
      - 3311:3311
    networks:
      internal:
    image: bailo_artefactscan:${INSTANCE_NAME}
    build:
      context: ./lib/artefactscan_api
    volumes:
      - ./backend/certs:/certs:ro
    healthcheck:
      test: ['CMD-SHELL', 'curl --fail http://127.0.0.1:3311/info || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5

  mailcrab:
    networks:
      default:
      internal:
    ports:
      - 1080:1080
      - 1025:1025
    image: marlonb/mailcrab:v1.6.5

  webhook-tester:
    networks:
      default:
      internal:
    image: tarampampam/webhook-tester:2.3.0
    command: serve --auto-create-sessions
    ports:
      - 8082:8080

  backend:
    depends_on:
      clamd:
        condition: service_healthy
      registry:
        condition: service_started
      minio:
        condition: service_started
      mongo:
        condition: service_started
      artefactscan:
        condition: service_healthy

  registry:
    depends_on:
      artefactscan:
        condition: service_healthy
