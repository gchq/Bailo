name: bailo-dev

services:
  backend:
    ports:
      - 9229:9229
    volumes:
      - ./backend/src:/app/src
    build:
      target: dev

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules/@next # use container-built @next SWC binaries (musl), not the host's (e.g. glibc)
    build:
      target: dev

  minio:
    environment:
      MINIO_BROWSER_REDIRECT_URL: http://localhost:8080/minio/ui/
      MINIO_SERVER_URL: http://minio:9000
      MINIO_SKIP_CLIENT: yes

networks:
  debug:
    name: ${INSTANCE_NAME}_debug
