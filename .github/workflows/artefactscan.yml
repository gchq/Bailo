name: ArtefactScan Python REST API Unit Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v7
      # Restrict PR execution to files that affect this workflow to reduce CI runtime and GitHub Actions consumption
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'lib/artefactscan_api/**'
              - '.github/workflows/artefactscan.yml'

  artefactscan_build:
    needs: changes
    if: github.ref == 'refs/heads/main' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd lib/artefactscan_api
          python -m pip install -r requirements-dev.txt

      - name: Run basic tests
        run: |
          cd lib/artefactscan_api
          python -m pytest
        env:
          PYTEST_RUN_PATH: "lib/artefactscan_api"

      - name: Run integration tests
        run: |
          cd lib/artefactscan_api
          python -m pytest -m integration
        env:
          PYTEST_RUN_PATH: "lib/artefactscan_api"

  # Gate job for branch protection: always runs so the required check is never left pending when the matrix is skipped
  artefactscan_build_result:
    if: always()
    needs: [changes, artefactscan_build]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: >-
          needs.artefactscan_build.result == 'failure'
          || (needs.changes.outputs.relevant == 'true' && needs.artefactscan_build.result != 'success')
