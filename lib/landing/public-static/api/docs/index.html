<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bailo API Documentation</title>
    <link rel="stylesheet" type="text/css" href="./swagger-ui.css" />
    <link rel="stylesheet" type="text/css" href="./index.css" />
    <link rel="icon" type="image/png" href="./favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="./favicon-16x16.png" sizes="16x16" />
  </head>

  <body>
    <!-- Plain HTML as a close-enough approximation of the AppBar in `lib/landing/src/Wrapper.tsx` -->
    <nav
      style="
        background: #54278e;
        display: flex;
        align-items: center;
        padding: 0px 24px;
        min-height: 64px;
        position: sticky;
        top: 0;
        font-family: Roboto, Helvetica, Arial, sans-serif;
        z-index: 1;
        font-size: 0.875rem;
        letter-spacing: 0.4px;
      "
    >
      <a href="../../">
        <img src="../../logo-horizontal-light.png" alt="Bailo" height="60" width="142" />
      </a>
      <a href="../../docs/" style="color: #fff; text-decoration: none; padding: 6px 8px; margin-left: 8px"
        >Documentation</a
      >
      <a href="./" style="color: #fff; text-decoration: none; padding: 6px 8px">API Reference</a>
      <a href="../../python/index.html" style="color: #fff; text-decoration: none; padding: 6px 8px"
        >Python Documentation</a
      >
    </nav>
    <div id="swagger-ui"></div>
    <!-- Plain HTML Copyright approximation -->
    <p
      style="
        text-align: center;
        font-family: Roboto, Helvetica, Arial, sans-serif;
        padding: 16px;
        margin: 0;
        /* use primary theme colour as swagger docs support both light & dark mode */
        background: #54278e;
        color: #fff;
      "
    >
      Copyright © Crown Copyright 2026.
    </p>
    <script src="./swagger-ui-bundle.js" charset="UTF-8"></script>
    <script src="./swagger-ui-standalone-preset.js" charset="UTF-8"></script>
    <script>
      window.onload = function () {
        window.ui = SwaggerUIBundle({
          urls: [
            { url: './swagger-v2.json', name: 'v2.0.0' },
            { url: './swagger-v3.json', name: 'v3.0.0(beta)' },
          ],
          dom_id: '#swagger-ui',
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          plugins: [SwaggerUIBundle.plugins.DownloadUrl],
          layout: 'StandaloneLayout',
          supportedSubmitMethods: [],
        })
      }
    </script>
  </body>
</html>
