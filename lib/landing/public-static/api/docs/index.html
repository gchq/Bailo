<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bailo API Documentation</title>
    <link rel="stylesheet" type="text/css" href="./swagger-ui.css" />
    <link rel="stylesheet" type="text/css" href="./index.css" />
    <link rel="icon" type="image/png" href="./favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="./favicon-16x16.png" sizes="16x16" />
  </head>

  <body>
    <nav style="background: #54278e; padding: 12px 24px; display: flex; align-items: center; gap: 16px">
      <a href="../../" style="color: #fff; font: bold 20px/1 sans-serif; text-decoration: none">Bailo</a>
      <span style="color: rgba(255, 255, 255, 0.6); font: 14px/1 sans-serif">API Documentation</span>
    </nav>
    <div id="swagger-ui"></div>
    <script src="./swagger-ui-bundle.js" charset="UTF-8"></script>
    <script src="./swagger-ui-standalone-preset.js" charset="UTF-8"></script>
    <script>
      window.onload = function () {
        window.ui = SwaggerUIBundle({
          urls: [
            { url: './swagger-v2.json', name: 'v2.0.0' },
            { url: './swagger-v3.json', name: 'v3.0.0(beta)' },
          ],
          dom_id: '#swagger-ui',
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          plugins: [SwaggerUIBundle.plugins.DownloadUrl],
          layout: 'StandaloneLayout',
          supportedSubmitMethods: [],
        })
      }
    </script>
  </body>
</html>
