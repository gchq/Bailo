---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bailo.fullname" . }}-config
  labels:
    {{- include "bailo.labels" . | nindent 4 }}
data:
  production.cjs: |
    module.exports = {{ include "production-config" . | fromYaml | toPrettyJson | nindent 6 }}

  custom-environment-variables.cjs: |
    module.exports = {{ include "environment-config" . | fromYaml | toPrettyJson | nindent 6 }}
