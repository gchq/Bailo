---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bailo.fullname" . }}-registry
  labels:
    {{- include "bailo.labels" . | nindent 4 }}
data:
  registry.conf: |
    version: 0.1
    log:
      level: info
      fields:
        service: registry
    storage:
      cache:
        blobdescriptor: inmemory
      s3:
        {{- if not (and (hasPrefix "s3" .Values.minio.host) (hasSuffix ".amazonaws.com" .Values.minio.host)) }}
        regionendpoint: {{ ternary "https" "http" (eq .Values.minio.useSSL true)}}://{{ include "bailo.minio.host" . }}:{{ .Values.minio.service.ports.api }}
        {{- end }}
        bucket: {{ .Values.minio.registryBucket }}
        secure: {{ .Values.minio.useSSL }}
        region: {{ .Values.minio.region }}
        forcepathstyle: true
      redirect:
        disable: true
      delete:
        enabled: true
      maintenance:
        uploadpurging:
          enabled: true
          age: 168h
          interval: 24h
          dryrun: false
        readonly:
          enabled: false
    http:
      addr: :{{ .Values.registry.port }}
      relativeurls: true
      headers:
        X-Content-Type-Options: [nosniff]
    {{- if .Values.artefactscan.trivy.ca.enabled }}
    notifications:
      endpoints:
        - name: pushed-image-trigger-artefactscan-webhook
          url: http://{{ include "bailo.fullname" . }}-backend:{{ .Values.service.backendPort }}/internal/registry/events
          timeout: 5s
          threshold: 5
          backoff: 1s
          events:
            - push
    {{- end }}
